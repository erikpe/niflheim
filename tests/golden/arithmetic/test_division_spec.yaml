runs:
  - name: division_i64
    input:
      args: ["1", "-9223372036854775808", "9223372036854775807", "0", "1", "-1", "123456789", "1", "2", "-2", "9223372036854775807", "123456789", "-3"]
    expect:
      exit_code: 0

  - name: division_i64_special_cases
    input:
      args: ["2", "-7", "100", "7", "-100", "-7", "-100", "7", "100", "-100", "7", "100", "-7", "-100", "-7", "100", "7"]
    expect:
      exit_code: 0

  - name: division_u64
    input:
      args: ["3", "0", "1", "18446744073709551615", "1000000000", "4000000000000000000", "1", "18446744073709551615", "1000000000", "4000000000000000000", "3"]
    expect:
      exit_code: 0

  - name: division_u64_highbit
    input:
      args: ["4", "18446744073709551615", "9223372036854775808", "1", "1000000000", "4000000000000000000", "3", "2"]
    expect:
      exit_code: 0

  - name: division_u8
    input:
      args: ["5", "0", "1", "255", "17", "200", "1", "255", "17", "200", "3"]
    expect:
      exit_code: 0

  - name: division_double
    input:
      args: ["6", "-8.0", "1.0", "2.0", "16.0", "0.5"]
    expect:
      exit_code: 0
