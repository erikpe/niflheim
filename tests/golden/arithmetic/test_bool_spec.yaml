tests:
  - mode: "run"
    name: "test_bool"
    src_file: "test_bool.nif"
    runs: &test_bool_runs
      - {name: "bool_literals", input: {args: ["1"]}, expect: {exit_code: 0}}
      - {name: "bool_constants", input: {args: ["2"]}, expect: {exit_code: 0}}
      - {name: "bool_args", input: {args: ["3", "false", "false", "true", "true"]}, expect: {exit_code: 0}}
      - {name: "bool_short_circuit_args", input: {args: ["4", "false", "true", "not-bool", "not-bool"]}, expect: {exit_code: 0}}
  - mode: "run"
    name: "test_bool_backend_constant_fold"
    src_file: "test_bool.nif"
    runs: *test_bool_runs
    build_args: ["--disable-semantic-optimization", "constant_fold"]
