tests:
  - mode: "run"
    name: "test_power"
    src_file: "test_power.nif"
    runs: &test_power_runs
      - {name: "power_i64_literals", input: {args: ["1"]}, expect: {exit_code: 0}}
      - {name: "power_i64_constants", input: {args: ["2"]}, expect: {exit_code: 0}}
      - name: "power_i64_args"
        input:
          args:
            - "3"
            - "-2"
            - "0"
            - "-2"
            - "1"
            - "-2"
            - "2"
            - "-2"
            - "3"
            - "-2"
            - "4"
            - "-1"
            - "63"
            - "-1"
            - "64"
            - "0"
            - "0"
            - "0"
            - "5"
            - "1"
            - "63"
            - "2"
            - "10"
            - "3"
            - "40"
            - "-9223372036854775808"
            - "1"
            - "-9223372036854775808"
            - "2"
            - "9223372036854775807"
            - "2"
        expect:
          exit_code: 0
      - {name: "power_u64_literals", input: {args: ["4"]}, expect: {exit_code: 0}}
      - {name: "power_u64_constants", input: {args: ["5"]}, expect: {exit_code: 0}}
      - name: "power_u64_args"
        input:
          args: ["6", "0", "0", "0", "5", "1", "64", "2", "10", "2", "63", "2", "64", "3", "40", "18446744073709551615", "1", "18446744073709551615", "2", "4000000000", "3"]
        expect:
          exit_code: 0
      - {name: "power_u8_literals", input: {args: ["7"]}, expect: {exit_code: 0}}
      - {name: "power_u8_constants", input: {args: ["8"]}, expect: {exit_code: 0}}
      - name: "power_u8_args"
        input:
          args: ["9", "0", "0", "0", "5", "1", "255", "2", "7", "2", "8", "3", "5", "5", "3", "16", "2", "17", "2", "200", "2", "255", "2"]
        expect:
          exit_code: 0
      - {name: "power_precedence_literals", input: {args: ["10"]}, expect: {exit_code: 0}}
      - {name: "power_precedence_constants", input: {args: ["11"]}, expect: {exit_code: 0}}
      - {name: "power_precedence_args", input: {args: ["12", "2", "3", "4", "2", "3", "4"]}, expect: {exit_code: 0}}
  - mode: "run"
    name: "test_power_backend_constant_fold"
    src_file: "test_power.nif"
    runs: *test_power_runs
    build_args: ["--disable-semantic-optimization", "constant_fold"]
