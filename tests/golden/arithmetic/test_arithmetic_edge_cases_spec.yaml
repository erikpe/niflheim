tests:
  - mode: "run"
    name: "test_arithmetic_edge_cases"
    src_file: "test_arithmetic_edge_cases.nif"
    runs: &test_arithmetic_edge_cases_runs
      - name: "arithmetic_edge_cases_u64_highbit"
        input:
          args: ["1", "18446744073709551615", "9223372036854775808", "1", "1000000000", "4000000000000000000", "3", "2"]
        expect:
          exit_code: 0
      - {name: "arithmetic_edge_cases_u8_narrowing", input: {args: ["2", "200", "2", "250"]}, expect: {exit_code: 0}}
      - {name: "arithmetic_edge_cases_precedence", input: {args: ["3", "1", "2", "6", "5", "1"]}, expect: {exit_code: 0}}
  - mode: "run"
    name: "test_arithmetic_edge_cases_backend_constant_fold"
    src_file: "test_arithmetic_edge_cases.nif"
    runs: *test_arithmetic_edge_cases_runs
    build_args: ["--disable-semantic-optimization", "constant_fold", "algebraic_simplify"]
