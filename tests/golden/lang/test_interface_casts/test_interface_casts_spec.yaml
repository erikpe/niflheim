tests:
  - mode: "run"
    name: "test_interface_casts"
    src_file: "test_interface_casts.nif"
    runs:
      - {name: "class_to_interface_cast", input: {args: ["1"]}, expect: {exit_code: 0}}
      - {name: "obj_to_interface_cast", input: {args: ["2"]}, expect: {exit_code: 0}}
      - {name: "interface_to_obj_round_trip", input: {args: ["3"]}, expect: {exit_code: 0}}
      - {name: "interface_to_interface_cast", input: {args: ["4"]}, expect: {exit_code: 0}}
      - {name: "obj_interface_interface_chain", input: {args: ["5"]}, expect: {exit_code: 0}}
      - {name: "null_obj_to_interface_cast", input: {args: ["6"]}, expect: {exit_code: 0}}
      - {name: "null_interface_to_interface_cast", input: {args: ["7"]}, expect: {exit_code: 0}}
  - mode: "compile-fail"
    name: "test_interface_cast_errors"
    src_file: "error_cast_to_interface.nif"
    compile_error_match: "Invalid cast from 'Car' to 'Fruit'"
  - mode: "compile-fail"
    name: "primitive_to_interface_cast_error"
    src_file: "error_primitive_to_interface.nif"
    compile_error_match: "Invalid cast from 'i64' to 'Hashable'"
  - mode: "compile-fail"
    name: "array_to_interface_cast_error"
    src_file: "error_array_to_interface.nif"
    compile_error_match: "Invalid cast from 'i64[]' to 'Hashable'"
  - mode: "compile-fail"
    name: "interface_to_primitive_cast_error"
    src_file: "error_interface_to_primitive.nif"
    compile_error_match: "Invalid cast from 'Hashable' to 'i64'"
  - mode: "compile-fail"
    name: "interface_to_array_cast_error"
    src_file: "error_interface_to_array.nif"
    compile_error_match: "Invalid cast from 'Hashable' to 'i64[]'"
