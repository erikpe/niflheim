tests:
  - mode: "run"
    name: "test_shadowing"
    src_file: "test_shadowing.nif"
    runs:
      - {name: "nested_block_shadowing", input: {stdin: "1\n"}, expect: {exit_code: 0, stdout: "20\n10\n21\n"}}
      - name: "for_in_shadowing_preserves_outer_local"
        input:
          stdin: "2\n"
        expect:
          exit_code: 0
          stdout: "99\n15\n"
      - {name: "param_shadowing_and_outer_restore", input: {stdin: "3\n"}, expect: {exit_code: 0, stdout: "7\n5\n12\n"}}
