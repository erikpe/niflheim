tests:
  - mode: "run"
    name: "test_inheritance"
    src_file: "test_inheritance.nif"
    runs:
      - {name: "inherited_fields_and_methods", input: {stdin: "1\n"}, expect: {exit_code: 0}}
      - {name: "subclass_to_base_assignment_and_same_type", input: {stdin: "2\n"}, expect: {exit_code: 0}}
      - {name: "inherited_interface_dispatch_and_cast_chain", input: {stdin: "3\n"}, expect: {exit_code: 0}}
      - {name: "subtype_aware_type_tests_and_obj_casts", input: {stdin: "4\n"}, expect: {exit_code: 0}}
      - {name: "explicit_constructor_chaining", input: {stdin: "5\n"}, expect: {exit_code: 0}}
      - {name: "compatibility_constructor_chaining", input: {stdin: "6\n"}, expect: {exit_code: 0}}
  - mode: "compile-fail"
    name: "unknown_superclass"
    src_file: "error_unknown_superclass.nif"
    compile_error_match: "Unknown superclass 'Missing'"
  - mode: "compile-fail"
    name: "interface_as_superclass"
    src_file: "error_interface_superclass.nif"
    compile_error_match: "Superclass 'Metric' is not a class"
  - mode: "compile-fail"
    name: "self_inheritance"
    src_file: "error_self_inheritance.nif"
    compile_error_match: "Class 'Loop' cannot extend itself"
  - mode: "compile-fail"
    name: "inheritance_cycle"
    src_file: "error_inheritance_cycle.nif"
    compile_error_match: "Inheritance cycle detected"
  - mode: "compile-fail"
    name: "inherited_field_redeclaration"
    src_file: "error_inherited_field_redeclaration.nif"
    compile_error_match: "Duplicate field 'value'"
  - mode: "compile-fail"
    name: "inherited_method_redeclaration"
    src_file: "error_inherited_method_redeclaration.nif"
    compile_error_match: "Duplicate method 'read'"
  - mode: "compile-fail"
    name: "inherited_private_field_access"
    src_file: "error_inherited_private_field_access.nif"
    compile_error_match: "Member 'Base.value' is private"
  - mode: "compile-fail"
    name: "inherited_private_method_access"
    src_file: "error_inherited_private_method_access.nif"
    compile_error_match: "Member 'Base.hidden' is private"
  - mode: "compile-fail"
    name: "subclass_constructor_missing_super"
    src_file: "error_subclass_constructor_missing_super.nif"
    compile_error_match: "Subclass constructor must begin with super(...)"
  - mode: "compile-fail"
    name: "super_outside_subclass_constructor"
    src_file: "error_super_outside_subclass_constructor.nif"
    compile_error_match: "super(...) is only allowed as the first statement of a subclass constructor"
  - mode: "compile-fail"
    name: "inherited_field_initialized_directly"
    src_file: "error_inherited_field_initialized_directly.nif"
    compile_error_match: "Inherited field 'Base.value' must be initialized via super(...)"
  - mode: "compile-fail"
    name: "overloaded_superclass_requires_constructor"
    src_file: "error_overloaded_superclass_requires_constructor.nif"
    compile_error_match: "Class 'Derived' must declare a constructor because superclass 'Base' has overloaded constructors"
  - mode: "compile-fail"
    name: "constructor_parameter_conflicts_with_inherited_parameter"
    src_file: "error_constructor_parameter_conflict.nif"
    compile_error_match: "Constructor parameter 'seed' conflicts with inherited constructor parameter"
