tests:
  - mode: "run"
    name: "test_array"
    src_file: "test_array.nif"
    runs:
      - {name: "primitive_smoke_u8_i64", input: {args: ["1"]}, expect: {exit_code: 0}}
      - {name: "reference_defaults_null", input: {args: ["2"]}, expect: {exit_code: 0}}
      - {name: "bool_and_double_arrays", input: {args: ["3"]}, expect: {exit_code: 0}}
      - {name: "slice_copy_behavior", input: {args: ["4"]}, expect: {exit_code: 0}}
      - {name: "get_oob_panics", input: {args: ["5"]}, expect: {panic: "rt_array_get_u8: index out of bounds"}}
      - {name: "set_oob_panics", input: {args: ["6"]}, expect: {panic: "rt_array_set_u8: index out of bounds"}}
      - {name: "slice_oob_panics", input: {args: ["7"]}, expect: {panic: "rt_array_slice_u8: invalid slice range"}}
      - {name: "negative_index_panics", input: {args: ["8"]}, expect: {panic: "rt_array_get_u8: index out of bounds"}}
      - {name: "set_slice_write_behavior", input: {args: ["9"]}, expect: {exit_code: 0}}
      - name: "set_slice_invalid_length_panics"
        input:
          args: ["10"]
        expect:
          panic: "rt_array_set_slice_u8: invalid slice assignment"
      - {name: "obj_to_u64_array_cast_ok", input: {args: ["11"]}, expect: {exit_code: 0}}
      - {name: "obj_to_u64_array_cast_bad_kind_panics", input: {args: ["12"]}, expect: {panic: "bad cast (u8[] -> u64[])"}}
      - name: "primitive_array_to_reference_array_cast_panics"
        input:
          args: ["13"]
        expect:
          panic: "bad cast (u64[] -> Obj[])"
      - name: "reference_array_to_primitive_array_cast_panics"
        input:
          args: ["14"]
        expect:
          panic: "bad cast (Obj[] -> u64[])"
      - {name: "reference_array_roundtrip_cast_ok", input: {args: ["15"]}, expect: {exit_code: 0}}
      - {name: "nested_primitive_index_get_set_levels", input: {args: ["16"]}, expect: {exit_code: 0}}
      - {name: "nested_primitive_slice_get_set_levels", input: {args: ["17"]}, expect: {exit_code: 0}}
      - {name: "nested_reference_index_slice_levels", input: {args: ["18"]}, expect: {exit_code: 0}}
      - {name: "deeply_nested_u8_index_slice_levels", input: {args: ["19"]}, expect: {exit_code: 0}}
      - name: "nested_set_slice_invalid_length_panics"
        input:
          args: ["20"]
        expect:
          panic: "rt_array_set_slice_ref: invalid slice assignment"
      - name: "nested_inner_slice_oob_panics"
        input:
          args: ["21"]
        expect:
          panic: "rt_array_slice_i64: invalid slice range"
      - {name: "interface_element_arrays_support_storage_and_slice", input: {args: ["22"]}, expect: {exit_code: 0}}
      - {name: "len_on_null_panics", input: {args: ["23"]}, expect: {panic: "Array API called with null object"}}
  - mode: "compile-fail"
    name: "non_u64_array_constructor_length"
    src_file: "error_non_u64_array_constructor_length.nif"
    compile_error_match: "Expected 'u64', got 'bool'"
  - mode: "compile-fail"
    name: "non_i64_array_get_index"
    src_file: "error_non_i64_array_get_index.nif"
    compile_error_match: "Expected 'i64', got 'bool'"
  - mode: "compile-fail"
    name: "non_i64_array_set_index"
    src_file: "error_non_i64_array_set_index.nif"
    compile_error_match: "Expected 'i64', got 'bool'"
  - mode: "compile-fail"
    name: "non_i64_array_slice_end"
    src_file: "error_non_i64_array_slice_end.nif"
    compile_error_match: "Expected 'i64', got 'bool'"
  - mode: "compile-fail"
    name: "array_slice_value_type_mismatch"
    src_file: "error_array_slice_value_type_mismatch.nif"
    compile_error_match: "Cannot assign 'bool' to 'u8[]'"
  - mode: "compile-fail"
    name: "array_invariance_assignment"
    src_file: "error_array_invariance_assignment.nif"
    compile_error_match: "Cannot assign 'Person[]' to 'Obj[]'"
  - mode: "compile-fail"
    name: "wrong_array_element_assignment_type"
    src_file: "error_wrong_array_element_assignment_type.nif"
    compile_error_match: "Cannot assign 'i64' to 'u8'"
  - mode: "compile-fail"
    name: "array_len_wrong_arity"
    src_file: "error_array_len_wrong_arity.nif"
    compile_error_match: "Expected 0 arguments, got 1"
  - mode: "compile-fail"
    name: "unknown_array_member_access"
    src_file: "error_unknown_array_member_access.nif"
    compile_error_match: "Array type 'u8[]' has no method 'foo'"
  - mode: "compile-fail"
    name: "cross_element_array_cast"
    src_file: "error_cross_element_array_cast.nif"
    compile_error_match: "Invalid cast from 'Person[]' to 'Obj[]'"
