tests:
  - mode: "run"
    name: "test_virtual_dispatch"
    src_file: "test_virtual_dispatch.nif"
    runs:
      - {name: "base_typed_receiver_dispatches_to_override", input: {args: ["1"]}, expect: {exit_code: 0}}
      - {name: "base_method_via_self_hits_override", input: {args: ["2"]}, expect: {exit_code: 0}}
      - {name: "inherited_non_overridden_method_stays_base_impl", input: {args: ["3"]}, expect: {exit_code: 0}}
      - {name: "override_updates_interface_dispatch", input: {args: ["4"]}, expect: {exit_code: 0}}
      - {name: "inherited_override_stays_effective_across_deeper_class_chain", input: {args: ["5"]}, expect: {exit_code: 0}}
      - {name: "inherited_override_stays_effective_across_deeper_interface_chain", input: {args: ["6"]}, expect: {exit_code: 0}}
      - {name: "inherited_interface_dispatch_handles_mixed_stack_args", input: {args: ["7"]}, expect: {exit_code: 0}}
      - {name: "structural_index_get_dispatches_to_override", input: {args: ["8"]}, expect: {exit_code: 0}}
      - {name: "structural_index_get_via_self_dispatches_to_override", input: {args: ["9"]}, expect: {exit_code: 0}}
      - {name: "structural_index_set_dispatches_to_override", input: {args: ["10"]}, expect: {exit_code: 0}}
      - {name: "structural_index_set_via_self_dispatches_to_override", input: {args: ["11"]}, expect: {exit_code: 0}}
      - {name: "structural_slice_get_dispatches_to_override", input: {args: ["12"]}, expect: {exit_code: 0}}
      - {name: "structural_slice_get_via_self_dispatches_to_override", input: {args: ["13"]}, expect: {exit_code: 0}}
      - {name: "structural_slice_set_dispatches_to_override", input: {args: ["14"]}, expect: {exit_code: 0}}
      - {name: "structural_slice_set_via_self_dispatches_to_override", input: {args: ["15"]}, expect: {exit_code: 0}}
      - {name: "structural_for_in_dispatches_to_override", input: {args: ["16"]}, expect: {exit_code: 0}}
      - {name: "structural_for_in_dispatches_iter_len_and_iter_get_overrides", input: {args: ["17"]}, expect: {exit_code: 0}}
      - {name: "structural_for_in_via_self_dispatches_to_override", input: {args: ["18"]}, expect: {exit_code: 0}}
      - {name: "null_receiver_panics_deterministically", input: {args: ["19"]}, expect: {panic: "null dereference"}}
      - {name: "interface_typed_structural_index_get_dispatches_to_override", input: {args: ["20"]}, expect: {exit_code: 0}}
      - {name: "interface_typed_structural_index_set_dispatches_to_override", input: {args: ["21"]}, expect: {exit_code: 0}}
      - {name: "interface_typed_structural_slice_get_dispatches_to_override", input: {args: ["22"]}, expect: {exit_code: 0}}
      - {name: "interface_typed_structural_slice_set_dispatches_to_override", input: {args: ["23"]}, expect: {exit_code: 0}}
      - {name: "interface_typed_structural_for_in_dispatches_to_override", input: {args: ["24"]}, expect: {exit_code: 0}}
  - mode: "compile-fail"
    name: "override_without_inherited_method"
    src_file: "error_override_without_inherited_method.nif"
    compile_error_match: "Method 'Derived.missing' is marked override but no inherited method exists"
  - mode: "compile-fail"
    name: "override_private_base_method"
    src_file: "error_override_private_base_method.nif"
    compile_error_match: "Method 'Derived.hidden' cannot override inherited private method 'Base.hidden'"
  - mode: "compile-fail"
    name: "override_static_base_method"
    src_file: "error_override_static_base_method.nif"
    compile_error_match: "Method 'Derived.make' cannot override inherited static method 'Base.make'"
  - mode: "compile-fail"
    name: "override_declared_private"
    src_file: "error_override_declared_private.nif"
    compile_error_match: "Method 'Derived.value' cannot be private because overrides must remain virtual"
  - mode: "compile-fail"
    name: "override_signature_mismatch"
    src_file: "error_override_signature_mismatch.nif"
    compile_error_match: "Method 'Derived.value' must match inherited signature exactly"
  - mode: "compile-fail"
    name: "collection_index_get_missing_override"
    src_file: "error_collection_index_get_missing_override.nif"
    compile_error_match: "Method 'Derived.index_get' must be declared with override"
  - mode: "compile-fail"
    name: "collection_index_set_signature_mismatch"
    src_file: "error_collection_index_set_signature_mismatch.nif"
    compile_error_match: "Method 'Derived.index_set' must match inherited signature exactly"
  - mode: "compile-fail"
    name: "collection_slice_get_missing_override"
    src_file: "error_collection_slice_get_missing_override.nif"
    compile_error_match: "Method 'Derived.slice_get' must be declared with override"
  - mode: "compile-fail"
    name: "collection_slice_set_private_override"
    src_file: "error_collection_slice_set_private_override.nif"
    compile_error_match: "Method 'Derived.slice_set' cannot be private because overrides must remain virtual"
  - mode: "compile-fail"
    name: "collection_iter_len_missing_override"
    src_file: "error_collection_iter_len_missing_override.nif"
    compile_error_match: "Method 'Derived.iter_len' must be declared with override"
  - mode: "compile-fail"
    name: "collection_iter_get_signature_mismatch"
    src_file: "error_collection_iter_get_signature_mismatch.nif"
    compile_error_match: "Method 'Derived.iter_get' must match inherited signature exactly"