tests:
  - mode: "run"
    name: "test_module_semantics"
    src_file: "test_module_semantics.nif"
    runs:
      - {name: "unique_unqualified_imports", input: {args: ["1"]}, expect: {exit_code: 0}}
      - {name: "full_imported_path_qualification", input: {args: ["2"]}, expect: {exit_code: 0}}
      - {name: "explicit_alias_qualification", input: {args: ["3"]}, expect: {exit_code: 0}}
      - {name: "reexport_alias_chain", input: {args: ["4"]}, expect: {exit_code: 0}}
      - {name: "same_leaf_full_path_disambiguation", input: {args: ["5"]}, expect: {exit_code: 0}}
      - {name: "same_leaf_alias_disambiguation", input: {args: ["6"]}, expect: {exit_code: 0}}
      - {name: "local_shadowing_and_qualified_access", input: {args: ["7"]}, expect: {exit_code: 0}}
      - {name: "imported_non_entry_main", input: {args: ["8"]}, expect: {exit_code: 0}}
      - {name: "alias_import_unique_unqualified_lookup", input: {args: ["9"]}, expect: {exit_code: 0}}
      - {name: "full_reexported_nested_module_path", input: {args: ["10"]}, expect: {exit_code: 0}}
      - {name: "explicit_reexport_path_alias", input: {args: ["11"]}, expect: {exit_code: 0}}
      - {name: "root_flatten_reexport_function_class_and_interface", input: {args: ["12"]}, expect: {exit_code: 0}}
      - {name: "root_flatten_reexport_preserves_nested_namespace", input: {args: ["13"]}, expect: {exit_code: 0}}
      - {name: "plain_import_bind_path_and_root_flatten", input: {args: ["14"]}, expect: {exit_code: 0}}
      - {name: "plain_multi_root_flatten_merge", input: {args: ["15"]}, expect: {exit_code: 0}}
      - {name: "export_multi_root_flatten_merge", input: {args: ["16"]}, expect: {exit_code: 0}}
      - {name: "mixed_multi_root_flatten_merge", input: {args: ["17"]}, expect: {exit_code: 0}}
  - mode: "run"
    name: "test_module_semantics_duplicate_symbols"
    src_file: "test_module_semantics_duplicate_symbols.nif"
    runs:
      - {name: "duplicate_symbol_alias_disambiguation", expect: {exit_code: 0}}
  - mode: "compile-fail"
    name: "missing_module"
    src_file: "error_missing_module.nif"
    compile_error_match: "Module 'does.not_exist' not found"
  - mode: "compile-fail"
    name: "legacy_leaf_alias_value_lookup"
    src_file: "error_legacy_leaf_alias_value.nif"
    compile_error_match: "Unknown identifier 'math'"
  - mode: "compile-fail"
    name: "legacy_leaf_alias_type_lookup"
    src_file: "error_legacy_leaf_alias_type.nif"
    compile_error_match: "Unknown type 'math.Counter'"
  - mode: "compile-fail"
    name: "ambiguous_imported_function"
    src_file: "error_ambiguous_imported_function.nif"
    compile_error_match: "Ambiguous imported function 'add'"
  - mode: "compile-fail"
    name: "ambiguous_imported_type"
    src_file: "error_ambiguous_imported_type.nif"
    compile_error_match: "Ambiguous imported type 'Counter'"
  - mode: "compile-fail"
    name: "ambiguous_imported_interface"
    src_file: "error_ambiguous_imported_interface.nif"
    compile_error_match: "Ambiguous imported interface 'Shared'"
  - mode: "compile-fail"
    name: "missing_exported_function"
    src_file: "error_missing_exported_function.nif"
    compile_error_match: "has no exported member 'hidden'"
  - mode: "compile-fail"
    name: "missing_exported_class"
    src_file: "error_missing_exported_class.nif"
    compile_error_match: "has no exported class 'Hidden'"
  - mode: "compile-fail"
    name: "missing_exported_interface"
    src_file: "error_missing_exported_interface.nif"
    compile_error_match: "has no exported interface 'HiddenFace'"
  - mode: "compile-fail"
    name: "missing_exported_module"
    src_file: "error_missing_exported_module.nif"
    compile_error_match: "has no exported module 'missing'"
  - mode: "compile-fail"
    name: "module_value_not_callable"
    src_file: "error_module_value_not_callable.nif"
    compile_error_match: "Module values are not callable"
  - mode: "compile-fail"
    name: "non_flattened_reexport_has_no_direct_member"
    src_file: "error_non_flattened_reexport_has_no_direct_member.nif"
    compile_error_match: "has no exported member 'add'"
  - mode: "compile-fail"
    name: "duplicate_root_flatten_export_symbol"
    src_file: "error_duplicate_root_flatten_export_symbol.nif"
    compile_error_match: "Duplicate exported symbol 'clash'"
  - mode: "compile-fail"
    name: "root_flatten_reexport_symbol_conflicts_with_local_definition"
    src_file: "error_root_flatten_reexport_symbol_conflicts_with_local_definition.nif"
    compile_error_match: "Duplicate exported symbol 'clash'"
  - mode: "compile-fail"
    name: "plain_import_original_path_not_bound"
    src_file: "error_plain_import_original_path_not_bound.nif"
    compile_error_match: "Unknown identifier 'tests'"
  - mode: "compile-fail"
    name: "export_import_original_path_not_bound"
    src_file: "error_export_import_original_path_not_bound.nif"
    compile_error_match: "Unknown identifier 'tests'"
  - mode: "compile-fail"
    name: "root_flatten_import_original_path_not_bound"
    src_file: "error_root_flatten_import_original_path_not_bound.nif"
    compile_error_match: "Unknown identifier 'tests'"
  - mode: "compile-fail"
    name: "duplicate_root_flatten_import_symbol"
    src_file: "error_duplicate_root_flatten_import_symbol.nif"
    compile_error_match: "Duplicate imported symbol 'clash'"
  - mode: "compile-fail"
    name: "root_flatten_import_symbol_conflicts_with_local_definition"
    src_file: "error_root_flatten_import_symbol_conflicts_with_local_definition.nif"
    compile_error_match: "Duplicate imported symbol 'clash'"
  - mode: "compile-fail"
    name: "duplicate_import_bind_path"
    src_file: "error_duplicate_import_bind_path.nif"
    compile_error_match: "Duplicate import path 'tools.calc'"
  - mode: "compile-fail"
    name: "duplicate_export_import_bind_path"
    src_file: "error_duplicate_export_import_bind_path.nif"
    compile_error_match: "Duplicate import path 'tools.calc'"
  - mode: "compile-fail"
    name: "duplicate_mixed_import_bind_path"
    src_file: "error_duplicate_mixed_import_bind_path.nif"
    compile_error_match: "Duplicate import path 'tools.calc'"
  - mode: "compile-fail"
    name: "duplicate_same_module_import_bind_path"
    src_file: "error_duplicate_same_module_import_bind_path.nif"
    compile_error_match: "Duplicate import path 'tools.calc'"
  - mode: "compile-fail"
    name: "import_bind_path_conflicts_with_local_definition"
    src_file: "error_import_bind_path_conflicts_with_local_definition.nif"
    compile_error_match: "Duplicate import path 'tools.calc'"
  - mode: "compile-fail"
    name: "export_import_bind_path_conflicts_with_local_definition"
    src_file: "error_export_import_bind_path_conflicts_with_local_definition.nif"
    compile_error_match: "Duplicate exported module 'tools.calc'"