tests:
  - mode: "run"
    name: "test_call_arg_overflow"
    src_file: "test_call_arg_overflow.nif"
    runs:
      - {name: "normal", input: {args: ["1"]}, expect: {exit_code: 0}}
      - {name: "edge_int_six_registers", input: {args: ["2"]}, expect: {exit_code: 0}}
      - {name: "overflow_int_seven", input: {args: ["3"]}, expect: {exit_code: 0}}
      - {name: "edge_double_eight_registers", input: {args: ["4"]}, expect: {exit_code: 0}}
      - {name: "overflow_double_nine", input: {args: ["5"]}, expect: {exit_code: 0}}
      - {name: "extreme_mixed_overflow", input: {args: ["6"]}, expect: {exit_code: 0}}
      - {name: "indirect_call_overflow", input: {args: ["7"]}, expect: {exit_code: 0}}
      - {name: "method_call_overflow", input: {args: ["8"]}, expect: {exit_code: 0}}
      - {name: "reference_overflow", input: {args: ["9"]}, expect: {exit_code: 0}}
      - {name: "reference_and_int_overflow", input: {args: ["10"]}, expect: {exit_code: 0}}
      - {name: "thirty_args_mixed_order", input: {args: ["11"]}, expect: {exit_code: 0}}
