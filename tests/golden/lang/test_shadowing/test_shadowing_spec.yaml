tests:
  - mode: "run"
    name: "test_shadowing"
    src_file: "test_shadowing.nif"
    runs:
      - {name: "nested_block_shadowing", input: {args: ["1"]}, expect: {exit_code: 0, stdout: "20\n10\n21\n"}}
      - name: "for_in_shadowing_preserves_outer_local"
        input:
          args: ["2"]
        expect:
          exit_code: 0
          stdout: "99\n15\n"
      - {name: "param_shadowing_and_outer_restore", input: {args: ["3"]}, expect: {exit_code: 0, stdout: "7\n5\n12\n"}}
      - {name: "top_level_body_shadow_uses_param_initializer", input: {args: ["4"]}, expect: {exit_code: 0, stdout: "15\n"}}
      - {name: "direct_call_prefers_local_callable_shadow", input: {args: ["5"]}, expect: {exit_code: 0, stdout: "42\n"}}
      - {name: "direct_call_prefers_local_callable_over_imported_constructor", input: {args: ["6"]}, expect: {exit_code: 0, stdout: "42\n"}}
  - mode: "compile-fail"
    name: "duplicate_local_same_block"
    src_file: "error_duplicate_local_same_block.nif"
    compile_error_match: "Duplicate local variable 'value'"
  - mode: "compile-fail"
    name: "duplicate_parameter_name"
    src_file: "error_duplicate_parameter_name.nif"
    compile_error_match: "Duplicate local variable 'value'"
  - mode: "compile-fail"
    name: "duplicate_inner_shadow_same_block"
    src_file: "error_duplicate_inner_shadow_same_block.nif"
    compile_error_match: "Duplicate local variable 'value'"
