tests:
  - mode: "run"
    name: "test_interface_imports"
    src_file: "test_interface_imports.nif"
    runs:
      - {name: "imported_interface_dispatch_and_return", input: {stdin: "1\n"}, expect: {exit_code: 0}}
      - {name: "imported_interface_array_and_storage", input: {stdin: "2\n"}, expect: {exit_code: 0}}
      - {name: "imported_interface_cross_module_cast", input: {stdin: "3\n"}, expect: {exit_code: 0}}
  - mode: "compile-fail"
    name: "ambiguous_imported_interface"
    src_file: "error_ambiguous_imported_interface.nif"
    compile_error_match: "Ambiguous imported interface 'Shared'"
  - mode: "compile-fail"
    name: "ambiguous_imported_type_between_interface_and_class"
    src_file: "error_ambiguous_imported_type.nif"
    compile_error_match: "Ambiguous imported type 'Shared'"
  - mode: "compile-fail"
    name: "unqualified_imported_class_in_implements"
    src_file: "error_imported_class_in_implements.nif"
    compile_error_match: "Implemented type 'Widget' is not an interface"
  - mode: "compile-fail"
    name: "qualified_imported_class_in_implements"
    src_file: "error_qualified_imported_class_in_implements.nif"
    compile_error_match: "has no exported interface 'Widget'"
  - mode: "compile-fail"
    name: "missing_qualified_imported_interface"
    src_file: "error_missing_qualified_imported_interface.nif"
    compile_error_match: "has no exported interface 'Missing'"
