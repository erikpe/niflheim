tests:
  - mode: "run"
    name: "test_function_values"
    src_file: "test_function_values.nif"
    runs:
      - {name: "mixed_indirect_calls", input: {args: ["1"]}, expect: {exit_code: 0}}
      - {name: "returned_function_value_dispatch", input: {args: ["2"]}, expect: {exit_code: 0}}
      - {name: "zero_arg_bool_callback", input: {args: ["3"]}, expect: {exit_code: 0}}
      - {name: "unit_callback_side_effects", input: {args: ["4"]}, expect: {exit_code: 0}}
      - {name: "function_value_in_class_field", input: {args: ["5"]}, expect: {exit_code: 0}}
      - {name: "imported_function_and_static_method_values", input: {args: ["7"]}, expect: {exit_code: 0}}
      - {name: "imported_helper_returns_function_value", input: {args: ["8"]}, expect: {exit_code: 0}}
      - name: "panic_propagates_through_indirect_call"
        input:
          args: ["6"]
        expect:
          panic: "rt_array_get_i64: index out of bounds"
  - mode: "compile-fail"
    name: "instance_method_value_unsupported"
    src_file: "error_instance_method_value_unsupported.nif"
    compile_error_match: "Instance methods are not first-class values in MVP"
  - mode: "compile-fail"
    name: "interface_method_value_unsupported"
    src_file: "error_interface_method_value_unsupported.nif"
    compile_error_match: "Interface method references are not supported in v1"
  - mode: "compile-fail"
    name: "function_value_assignment_type_mismatch"
    src_file: "error_function_value_assignment_type_mismatch.nif"
    compile_error_match: "Cannot assign 'fn(i64, i64) -> i64' to 'fn(i64) -> i64'"
  - mode: "compile-fail"
    name: "indirect_call_argument_type_mismatch"
    src_file: "error_indirect_call_argument_type_mismatch.nif"
    compile_error_match: "Cannot assign 'bool' to 'i64'"
  - mode: "compile-fail"
    name: "function_literal_not_supported"
    src_file: "error_function_literal_not_supported.nif"
    compile_error_match: "Function literals/closures are not supported in MVP"
  - mode: "compile-fail"
    name: "module_value_not_callable"
    src_file: "error_module_value_not_callable.nif"
    compile_error_match: "Module values are not callable"
