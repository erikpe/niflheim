tests:
  - mode: "run"
    name: "test_callable_field_invocation"
    src_file: "test_callable_field_invocation.nif"
    runs:
      - {name: "direct_callable_field_call", input: {stdin: "1\n"}, expect: {exit_code: 0}}
      - {name: "direct_callable_field_in_expression", input: {stdin: "2\n"}, expect: {exit_code: 0}}
      - {name: "binary_callable_field_call", input: {stdin: "3\n"}, expect: {exit_code: 0}}
      - {name: "binary_callable_field_direct_call", input: {stdin: "4\n"}, expect: {exit_code: 0}}
      - {name: "callable_field_static_method_symbol", input: {stdin: "5\n"}, expect: {exit_code: 0}}
      - {name: "callable_field_extracted_to_local_value", input: {stdin: "6\n"}, expect: {exit_code: 0}}
      - {name: "inherited_callable_field_invocation", input: {stdin: "7\n"}, expect: {exit_code: 0}}
  - mode: "compile-fail"
    name: "non_callable_field_direct_call"
    src_file: "error_non_callable_field_direct_call.nif"
    compile_error_match: "Expression of type 'i64' is not callable"
  - mode: "compile-fail"
    name: "callable_field_wrong_argument_type"
    src_file: "error_callable_field_wrong_argument_type.nif"
    compile_error_match: "Cannot assign 'bool' to 'i64'"
  - mode: "compile-fail"
    name: "callable_field_wrong_argument_count"
    src_file: "error_callable_field_wrong_argument_count.nif"
    compile_error_match: "Expected 1 arguments, got 0"
  - mode: "compile-fail"
    name: "private_callable_field_not_visible"
    src_file: "error_private_callable_field_not_visible.nif"
    compile_error_match: "Member 'HiddenHolder.f' is private"
  - mode: "compile-fail"
    name: "instance_method_not_storable_as_callable_field"
    src_file: "error_instance_method_not_callable_value.nif"
    compile_error_match: "Instance methods are not first-class values in MVP"
  - mode: "compile-fail"
    name: "interface_method_reference_not_storable_as_callable_field"
    src_file: "error_interface_method_reference_not_callable_value.nif"
    compile_error_match: "Interface method references are not supported in v1"
