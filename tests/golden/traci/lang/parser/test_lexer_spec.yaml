tests:
  - mode: "run"
    name: "test_lexer"
    src_file: "test_lexer.nif"
    runs:
      - name: "basic_tokens_and_channels"
        input:
          args: ["--stop-after", "lexer", "--lexer-output", "{tmp:lex}", "tests/golden/traci/lang/parser/lexer_basic.traci"]
        expect:
          exit_code: 0
          output_files:
            - tmp: "lex"
              expect: "PPLINE|#line 1 \\\"tests/golden/traci/lang/parser/lexer_basic.traci\\\" 1|99|1|0|tests/golden/traci/lang/parser/lexer_basic.traci:1:0|0|-\nWS|\\n|99|0|60|tests/golden/traci/lang/parser/lexer_basic.traci:0:60|0|-\nINT|17|0|1|0|tests/golden/traci/lang/parser/lexer_basic.traci:1:0|0|-\nPLUS_OP|+|0|1|2|tests/golden/traci/lang/parser/lexer_basic.traci:1:2|0|-\nWS|\\n|99|1|3|tests/golden/traci/lang/parser/lexer_basic.traci:1:3|0|-\nINT|23|0|2|0|tests/golden/traci/lang/parser/lexer_basic.traci:2:0|0|-\nSEMICOLON|;|0|2|2|tests/golden/traci/lang/parser/lexer_basic.traci:2:2|0|-\nWS|\\n|99|2|3|tests/golden/traci/lang/parser/lexer_basic.traci:2:3|0|-\nEOF|<EOF>|0|3|0|tests/golden/traci/lang/parser/lexer_basic.traci:3:0|0|-\n"
      - name: "keyword_categories"
        input:
          args: ["--stop-after", "lexer", "--lexer-output", "{tmp:lex}", "tests/golden/traci/lang/parser/lexer_keywords.traci"]
        expect:
          exit_code: 0
          output_files:
            - tmp: "lex"
              expect: "PPLINE|#line 1 \\\"tests/golden/traci/lang/parser/lexer_keywords.traci\\\" 1|99|1|0|tests/golden/traci/lang/parser/lexer_keywords.traci:1:0|0|-\nWS|\\n|99|0|63|tests/golden/traci/lang/parser/lexer_keywords.traci:0:63|0|-\nTRANSFORMATION|translate|0|1|0|tests/golden/traci/lang/parser/lexer_keywords.traci:1:0|0|-\nWS| |99|1|9|tests/golden/traci/lang/parser/lexer_keywords.traci:1:9|0|-\nPRIMITIVE_SHAPE|box|0|1|10|tests/golden/traci/lang/parser/lexer_keywords.traci:1:10|0|-\nWS| |99|1|13|tests/golden/traci/lang/parser/lexer_keywords.traci:1:13|0|-\nCSG_SHAPE|union|0|1|14|tests/golden/traci/lang/parser/lexer_keywords.traci:1:14|0|-\nWS| |99|1|19|tests/golden/traci/lang/parser/lexer_keywords.traci:1:19|0|-\nCOLOR|color|0|1|20|tests/golden/traci/lang/parser/lexer_keywords.traci:1:20|0|-\nWS| |99|1|25|tests/golden/traci/lang/parser/lexer_keywords.traci:1:25|0|-\nPIGMENT|image|0|1|26|tests/golden/traci/lang/parser/lexer_keywords.traci:1:26|0|-\nWS| |99|1|31|tests/golden/traci/lang/parser/lexer_keywords.traci:1:31|0|-\nCAMERA|camera|0|1|32|tests/golden/traci/lang/parser/lexer_keywords.traci:1:32|0|-\nWS| |99|1|38|tests/golden/traci/lang/parser/lexer_keywords.traci:1:38|0|-\nFINISH|finish|0|1|39|tests/golden/traci/lang/parser/lexer_keywords.traci:1:39|0|-\nWS| |99|1|45|tests/golden/traci/lang/parser/lexer_keywords.traci:1:45|0|-\nINTERIOR|interior|0|1|46|tests/golden/traci/lang/parser/lexer_keywords.traci:1:46|0|-\nWS|\\n|99|1|54|tests/golden/traci/lang/parser/lexer_keywords.traci:1:54|0|-\nEOF|<EOF>|0|2|0|tests/golden/traci/lang/parser/lexer_keywords.traci:2:0|0|-\n"
      - name: "pp_line_updates_include_locations"
        input:
          args: ["--stop-after", "lexer", "--lexer-output", "{tmp:lex}", "tests/golden/traci/testcode/a.traci"]
        expect:
          exit_code: 0
          output_files:
            - tmp: "lex"
              expect: "PPLINE|#line 1 \\\"tests/golden/traci/testcode/a.traci\\\" 1|99|1|0|tests/golden/traci/testcode/a.traci:1:0|0|-\nWS|\\n|99|0|47|tests/golden/traci/testcode/a.traci:0:47|0|-\nINT|17|0|1|0|tests/golden/traci/testcode/a.traci:1:0|0|-\nWS|\\n|99|1|2|tests/golden/traci/testcode/a.traci:1:2|0|-\nPPLINE|#line 1 \\\"tests/golden/traci/testcode/b.traci\\\" 1|99|2|0|tests/golden/traci/testcode/b.traci:2:0|1|tests/golden/traci/testcode/a.traci:2:0\nWS|\\n|99|0|47|tests/golden/traci/testcode/b.traci:0:47|1|tests/golden/traci/testcode/a.traci:2:0\nPLUS_OP|+|0|1|0|tests/golden/traci/testcode/b.traci:1:0|1|tests/golden/traci/testcode/a.traci:2:0\nWS|\\n |99|1|1|tests/golden/traci/testcode/b.traci:1:1|1|tests/golden/traci/testcode/a.traci:2:0\nINT|23|0|2|1|tests/golden/traci/testcode/b.traci:2:1|1|tests/golden/traci/testcode/a.traci:2:0\nWS|\\n|99|2|3|tests/golden/traci/testcode/b.traci:2:3|1|tests/golden/traci/testcode/a.traci:2:0\nPPLINE|#line 4 \\\"tests/golden/traci/testcode/a.traci\\\" 2|99|3|0|tests/golden/traci/testcode/a.traci:3:0|0|-\nWS|\\n|99|2|47|tests/golden/traci/testcode/a.traci:2:47|0|-\nSEMICOLON|;|0|3|0|tests/golden/traci/testcode/a.traci:3:0|0|-\nWS|\\n|99|3|1|tests/golden/traci/testcode/a.traci:3:1|0|-\nEOF|<EOF>|0|4|0|tests/golden/traci/testcode/a.traci:4:0|0|-\n"
      - name: "invalid_float_reports_lexer_error"
        input:
          input_files:
            - tmp: "bad_float"
              content: "1.2e+"
          args: ["--stop-after", "lexer", "{tmp:bad_float}"]
        expect:
          exit_code: 254
      - name: "airplane_scene_matches_java_lexer_reference"
        work_dir: "traci/scenes"
        input:
          args: ["--stop-after", "lexer", "--lexer-output", "{tmp:lex}", "lego/airplane.traci"]
        expect:
          exit_code: 0
          output_files:
            - tmp: "lex"
              expect_file: "airplane_lexer_java_reference.txt"
