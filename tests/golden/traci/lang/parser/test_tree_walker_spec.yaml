tests:
  - mode: "run"
    name: "test_tree_walker"
    src_file: "test_tree_walker.nif"
    runs:
      - name: "basic_tree_walker_dump"
        input:
          args: ["basic"]
        expect:
          exit_code: 0
          stdout_file: "test_tree_walker_basic_expected.txt"
      - name: "string_constant_is_unquoted"
        input:
          args: ["string"]
        expect:
          exit_code: 0
          stdout_file: "test_tree_walker_string_expected.txt"
      - {name: "constructs_tree_walker_dump", input: {args: ["constructs"]}, expect: {exit_code: 0, stdout_file: "test_tree_walker_constructs_expected.txt"}}
      - {name: "airplane_scene_matches_java_node_tree_reference", input: {args: ["airplane_java_reference"]}, expect: {exit_code: 0, stdout_file: "airplane_node_tree_java_reference.txt"}}
      - name: "fibonacci_preprocessed_file_treewalks"
        input:
          args: ["fibonacci"]
        expect:
          exit_code: 0
          stdout: "functions=1|statements=1|first_function=fib|first_statement=ReturnNode\n"
      - {name: "prime_checker_file_treewalks", input: {args: ["prime"]}, expect: {exit_code: 0, stdout: "functions=3|statements=0|first_function=floor\n"}}
      - name: "basic_shapes_preprocessed_file_treewalks"
        input:
          args: ["basic_shapes"]
        expect:
          exit_code: 0
          stdout: "functions=18|statements=6|first_function=roundedCylinder0_base|first_statement=AssignNode\n"
