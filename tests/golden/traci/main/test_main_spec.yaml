tests:
  - mode: "run"
    name: "test_main"
    src_file: "test_main.nif"
    runs:
      - name: "missing_input_file_returns_structured_preprocessor_diagnostic"
        input:
          args: ["missing"]
        expect:
          exit_code: 0
          stdout: |
            In file: proj/traci_java/testcode/does_not_exist.traci:0:0:
            Preprocessor error: Unable to open input file: 'proj/traci_java/testcode/does_not_exist.traci'
      - name: "existing_input_parses_after_preprocessor"
        input:
          args: ["parse_success"]
        expect:
          exit_code: 0
          stdout: |
            tokens=PPLINE,EOF|functions=1|statements=1|first_function=fib
