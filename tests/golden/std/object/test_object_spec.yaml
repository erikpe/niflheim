      - {name: "null_behavior", input: {stdin: "3"}, expect: {exit_code: 0}}
      - {name: "array_type_matching", input: {stdin: "4"}, expect: {exit_code: 0}}
      - {name: "box_type_matching", input: {stdin: "5"}, expect: {exit_code: 0}}
