tests:
  - mode: "run"
    name: "test_read_program_args"
    src_file: "test_read_program_args.nif"
    runs:
      - {name: "read_program_args_without_extra_args", expect: {exit_code: 0, stdout: "1\n"}}
      - name: "read_program_args_with_extra_args"
        input:
          args: ["alpha", "beta gamma", "", "delta"]
        expect:
          exit_code: 0
          stdout: "5\n|alpha|\n|beta gamma|\n||\n|delta|\n"
