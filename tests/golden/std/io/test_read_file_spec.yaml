runs:
  - name: read_file_all_reads_file_contents
    input:
      stdin: "1\n"
    expect:
      exit_code: 0
      stdout_file: "test_read_file_expected.txt"

  - name: read_file_all_exact_buffer_size
    input:
      stdin: "2\n"
    expect:
      exit_code: 0
      stdout: "4096\n"

  - name: read_file_all_larger_than_buffer
    input:
      stdin: "3\n"
    expect:
      exit_code: 0
      stdout: "5000\n"

  - name: read_file_all_missing_file_panics
    input:
      stdin: "4\n"
    expect:
      panic: "rt_file_open_read: failed opening file"
