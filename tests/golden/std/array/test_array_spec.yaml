tests:
  - mode: "run"
    name: "test_array"
    src_file: "test_array.nif"
    runs:
      - {name: "primitive_smoke_u8_i64", input: {stdin: "1"}, expect: {exit_code: 0}}
      - {name: "reference_defaults_null", input: {stdin: "2"}, expect: {exit_code: 0}}
      - {name: "slice_copy_behavior", input: {stdin: "3"}, expect: {exit_code: 0}}
      - {name: "get_oob_panics", input: {stdin: "4"}, expect: {panic: "rt_array_get_u8: index out of bounds"}}
      - {name: "set_oob_panics", input: {stdin: "5"}, expect: {panic: "rt_array_set_u8: index out of bounds"}}
      - {name: "slice_oob_panics", input: {stdin: "6"}, expect: {panic: "rt_array_slice_u8: invalid slice range"}}
      - {name: "negative_index_panics", input: {stdin: "7"}, expect: {panic: "rt_array_get_u8: index out of bounds"}}
      - {name: "set_slice_write_behavior", input: {stdin: "8"}, expect: {exit_code: 0}}
      - name: "set_slice_invalid_length_panics"
        input:
          stdin: "9"
        expect:
          panic: "rt_array_set_slice_u8: invalid slice assignment"
      - {name: "obj_to_u64_array_cast_ok", input: {stdin: "10"}, expect: {exit_code: 0}}
      - {name: "obj_to_u64_array_cast_bad_kind_panics", input: {stdin: "11"}, expect: {panic: "bad cast (u8[] -> u64[])"}}
      - name: "primitive_array_to_reference_array_cast_panics"
        input:
          stdin: "12"
        expect:
          panic: "bad cast (u64[] -> Obj[])"
      - name: "reference_array_to_primitive_array_cast_panics"
        input:
          stdin: "13"
        expect:
          panic: "bad cast (Obj[] -> u64[])"
      - {name: "reference_array_roundtrip_cast_ok", input: {stdin: "14"}, expect: {exit_code: 0}}
      - {name: "nested_primitive_index_get_set_levels", input: {stdin: "15"}, expect: {exit_code: 0}}
      - {name: "nested_primitive_slice_get_set_levels", input: {stdin: "16"}, expect: {exit_code: 0}}
      - {name: "nested_reference_index_slice_levels", input: {stdin: "17"}, expect: {exit_code: 0}}
      - {name: "deeply_nested_u8_index_slice_levels", input: {stdin: "18"}, expect: {exit_code: 0}}
      - name: "nested_set_slice_invalid_length_panics"
        input:
          stdin: "19"
        expect:
          panic: "rt_array_set_slice_ref: invalid slice assignment"
      - name: "nested_inner_slice_oob_panics"
        input:
          stdin: "20"
        expect:
          panic: "rt_array_slice_i64: invalid slice range"
