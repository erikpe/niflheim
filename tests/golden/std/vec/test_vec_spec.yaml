tests:
  - mode: "run"
    name: "test_vec"
    src_file: "test_vec.nif"
    runs:
      - {name: "vec_baseline", input: {stdin: "1"}, expect: {exit_code: 0}}
      - {name: "vec_index_sugar_with_wrapping_negative_indexes", input: {stdin: "2"}, expect: {exit_code: 0}}
      - {name: "vec_slice_sugar_forms_and_negative_wrapping", input: {stdin: "3"}, expect: {exit_code: 0}}
      - {name: "vec_slice_copy_independence", input: {stdin: "4"}, expect: {exit_code: 0}}
      - {name: "vec_grow_and_copy", input: {stdin: "5"}, expect: {exit_code: 0}}
      - {name: "vec_get_oob_panics", input: {stdin: "6"}, expect: {panic: "Vec.index_get: index out of bounds"}}
      - {name: "vec_set_oob_panics", input: {stdin: "7"}, expect: {panic: "Vec.index_set: index out of bounds"}}
      - name: "vec_get_negative_wrap_oob_panics"
        input:
          stdin: "8"
        expect:
          panic: "Vec.index_get: index out of bounds"
      - name: "vec_set_negative_wrap_oob_panics"
        input:
          stdin: "9"
        expect:
          panic: "Vec.index_set: index out of bounds"
      - {name: "vec_slice_oob_panics", input: {stdin: "10"}, expect: {panic: "Vec.slice_get: invalid slice range"}}
      - name: "vec_slice_negative_begin_oob_panics"
        input:
          stdin: "11"
        expect:
          panic: "Vec.slice_get: invalid slice range"
      - name: "vec_slice_negative_end_oob_panics"
        input:
          stdin: "12"
        expect:
          panic: "Vec.slice_get: invalid slice range"
      - {name: "vec_slice_reversed_panics", input: {stdin: "13"}, expect: {panic: "Vec.slice_get: invalid slice range"}}
      - {name: "vec_with_capacity_zero_is_allowed", input: {stdin: "14"}, expect: {exit_code: 0}}
      - {name: "vec_slice_write_sugar_updates_range", input: {stdin: "15"}, expect: {exit_code: 0}}
      - name: "vec_slice_write_length_mismatch_panics"
        input:
          stdin: "16"
        expect:
          panic: "Vec.slice_set: length mismatch"
      - {name: "vec_slice_write_oob_panics", input: {stdin: "17"}, expect: {panic: "Vec.slice_set: invalid slice range"}}
      - {name: "vec_for_in_iteration", input: {stdin: "18"}, expect: {exit_code: 0}}
      - {name: "vec_filter_copies_kept_runs", input: {stdin: "19"}, expect: {exit_code: 0}}
      - {name: "vec_filter_all_removed", input: {stdin: "20"}, expect: {exit_code: 0}}
      - {name: "vec_filter_calls_predicate_once_per_element", input: {stdin: "21"}, expect: {exit_code: 0}}
      - {name: "vec_map_returns_transformed_copy", input: {stdin: "22"}, expect: {exit_code: 0}}
      - {name: "vec_reduce_accumulates_values", input: {stdin: "23"}, expect: {exit_code: 0}}
      - {name: "vec_clear_resets_length_and_allows_reuse", input: {stdin: "24"}, expect: {exit_code: 0}}
      - {name: "vec_pop_returns_last_and_updates_length", input: {stdin: "25"}, expect: {exit_code: 0}}
      - {name: "vec_pop_empty_panics", input: {stdin: "26"}, expect: {panic: "Vec.pop: empty vector"}}
      - {name: "vec_append_clone_and_last", input: {stdin: "27"}, expect: {exit_code: 0}}
      - {name: "vec_last_empty_panics", input: {stdin: "28"}, expect: {panic: "Vec.last: empty vector"}}
