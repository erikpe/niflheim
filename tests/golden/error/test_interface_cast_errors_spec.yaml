runs:
  - name: obj_plain_to_interface_panics
    input:
      stdin: "1\n"
    expect:
      panic: "bad cast (tests.golden.error.test_interface_cast_errors::Plain -> tests.golden.error.test_interface_cast_errors::Hashable)"

  - name: class_to_unimplemented_interface_panics
    input:
      stdin: "2\n"
    expect:
      panic: "bad cast (tests.golden.error.test_interface_cast_errors::Gauge -> tests.golden.error.test_interface_cast_errors::Doubler)"

  - name: interface_to_interface_panics
    input:
      stdin: "3\n"
    expect:
      panic: "bad cast (tests.golden.error.test_interface_cast_errors::Gauge -> tests.golden.error.test_interface_cast_errors::Doubler)"

  - name: obj_from_interface_to_unimplemented_interface_panics
    input:
      stdin: "4\n"
    expect:
      panic: "bad cast (tests.golden.error.test_interface_cast_errors::Gauge -> tests.golden.error.test_interface_cast_errors::Doubler)"